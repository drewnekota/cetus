name: Release (macOS, signed + notarized)

# Builds cetus, signs it with a Developer ID Application certificate, notarizes
# it with Apple, and attaches the signed .dmg to a GitHub Release. Because every
# release is signed with the SAME stable Developer ID, users grant Accessibility
# / Screen Recording ONCE and the grant survives future updates — and Gatekeeper
# opens it with a double-click (no right-click bypass).
#
# No secret material lives in this repo. Configure these GitHub repository
# secrets (Settings → Secrets and variables → Actions):
#
#   APPLE_CERTIFICATE           base64 of your Developer ID Application .p12
#                               (base64 -i cert.p12 | pbcopy)
#   APPLE_CERTIFICATE_PASSWORD  the password you set when exporting the .p12
#   APPLE_SIGNING_IDENTITY      e.g. "Developer ID Application: Your Name (TEAMID)"
#   APPLE_ID                    your Apple Developer account email
#   APPLE_PASSWORD              an app-specific password (appleid.apple.com → Sign-In & Security)
#   APPLE_TEAM_ID               your 10-char Team ID (e.g. H8NRJ9BUBQ)
#   KEYCHAIN_PASSWORD           any random string (temp keychain password for this run)
#
# In-app auto-update signing (separate from Apple — a minisign keypair). Generate
# once with `pnpm tauri signer generate -w ~/.cetus-updater.key`, paste the
# PUBLIC key into src-tauri/tauri.conf.json (plugins.updater.pubkey), and set:
#
#   TAURI_SIGNING_PRIVATE_KEY            contents of the generated private key file
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD   the password you set during generation

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Allow the workflow's GITHUB_TOKEN to create the GitHub Release + upload assets.
permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14 # Apple Silicon runner → aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: oven-sh/setup-bun@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps
        run: pnpm install --frozen-lockfile

      - name: Build pi sidecar tree
        run: scripts/build-pi-sidecar.sh

      - name: Import Developer ID certificate into a temporary keychain
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/cetus-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # Make the temp keychain searchable so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build app bundle (unsigned — we sign nested binaries ourselves)
        run: pnpm tauri build --bundles app

      - name: Sign + notarize + staple the .app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -1)"
          scripts/macos-sign.sh "$APP" --notarize

      - name: Package signed .app into a .dmg, then sign + notarize the .dmg
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          APP="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -1)"
          VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          DMG="$RUNNER_TEMP/Cetus_${VERSION}_aarch64.dmg"
          # The .app inside is already notarized+stapled; we package (with the
          # drag-to-/Applications layout), then sign and notarize the dmg
          # container itself so the download is Gatekeeper-clean.
          scripts/package-dmg.sh "$APP" "$DMG"
          scripts/macos-sign.sh "$DMG" --notarize
          echo "DMG=$DMG" >> "$GITHUB_ENV"

      - name: Build + sign the updater artifact and manifest
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          APP="$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app' | head -1)"
          VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          # The in-app updater downloads a gzipped tar of the already
          # signed+notarized .app and swaps it in place. Build it AFTER
          # notarization so the Developer ID grant (Accessibility / Screen
          # Recording) survives the update — a tarball of the unsigned app would
          # silently break those permissions on the next launch.
          TARBALL="$RUNNER_TEMP/Cetus.app.tar.gz"
          tar -C "$(dirname "$APP")" -czf "$TARBALL" "$(basename "$APP")"
          # Minisign the tarball with the updater key (entirely separate from the
          # Apple Developer ID signature). The app verifies this against the
          # pubkey baked into tauri.conf.json before installing.
          pnpm tauri signer sign \
            -k "$TAURI_SIGNING_PRIVATE_KEY" \
            -p "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
            "$TARBALL"
          # Emit latest.json — the manifest the app polls. The signature is the
          # contents of the .sig file; the URL must resolve to the uploaded asset.
          SIGNATURE="$(cat "$TARBALL.sig")" \
          VERSION="$VERSION" \
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/Cetus.app.tar.gz" \
          MANIFEST="$RUNNER_TEMP/latest.json" \
          node -e '
            const fs = require("fs");
            fs.writeFileSync(process.env.MANIFEST, JSON.stringify({
              version: process.env.VERSION,
              notes: "See the GitHub release page for details.",
              pub_date: process.env.PUB_DATE,
              platforms: {
                "darwin-aarch64": {
                  signature: process.env.SIGNATURE,
                  url: process.env.URL,
                },
              },
            }, null, 2));
          '
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
          echo "MANIFEST=$RUNNER_TEMP/latest.json" >> "$GITHUB_ENV"

      - name: Create published GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release delete "$TAG" --yes
          fi
          gh release create "$TAG" \
            "$DMG" \
            "$TARBALL" \
            "$MANIFEST" \
            --title "$TAG" \
            --generate-notes \
            --latest \
            --verify-tag
